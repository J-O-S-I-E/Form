<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Form</title>
</head>
<body>
    <form action="http://www.google.com/search">
        <div>
            Let's search Google:

        </div>
    </form>
    <br><hr>
    <form action="submit">
        UserName<input type="text" size="10" maxlength="8" name="user"><br>
        <div>
            <p>What toppings do you want on your pizza?</p>
            <input type="checkbox" name="Pepperroni">Pepperoni <br>
            <input type="checkbox" name="Sausage">Sausage <br>
            <input type="checkbox" name="Chicken">Chicken <br>
        </div>
    <input type="submit" value="Log In" >
    </form>

    <br><hr>

            <option>Jerry</option>

        </select>
        <select>
